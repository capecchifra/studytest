<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>8th Wall + A-Frame: Tap to Place Ground</title>
  <meta name="description" content="🌵 Tocca il terreno per posizionare un cactus">

  <!-- 1. 8-Frame (versione modificata di A-Frame) - DEVE essere nel path corretto -->
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  
  <!-- 2. Engine binary 8th Wall con SLAM -->
  <script async src="./external/xr/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    .over {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    #promptText {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 18px;
      display: inline-block;
      font-family: sans-serif;
    }
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      color: lime;
      padding: 5px 10px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="over">
  <span id="promptText">🌵 Tocca il terreno per posizionare</span>
</div>
<div id="status">🟡 Inizializzazione AR...</div>

<!-- 
  ATTENZIONE: Secondo la documentazione, per world tracking devi avere:
  - xrconfig (obbligatorio)
  - xrweb (per world tracking)
-->
<a-scene
  xrconfig
  xrweb="allowedDevices: any"
  renderer="colorManagement:true">

  <a-assets>
    <img id="groundTex" src="assets/sand.jpg">
    <a-asset-item id="cactusModel" src="assets/cactus.glb"></a-asset-item>
  </a-assets>

  <!-- Camera: 8th Wall la gestisce automaticamente -->
  <a-camera id="camera"></a-camera>

  <!-- Luce ambientale + direzionale -->
  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>

</a-scene>

<script>
  // ===== INIZIALIZZAZIONE 8TH WALL PER A-FRAME =====
  // La documentazione dice: aggiungi onxrloaded() per inizializzare
  window.onxrloaded = function() {
    const statusEl = document.getElementById('status');
    statusEl.innerText = '🟢 AR pronto! Tocca il terreno';
    
    // Opzionale: configurazioni aggiuntive
    if (XR8.XrController) {
      XR8.XrController.configure({
        planeDetection: {
          enabled: true,
          classificationType: 'floor'
        }
      });
    }
  };

  // Se XR8 è già caricato, chiamalo subito
  if (window.XR8) {
    window.onxrloaded();
  }

  // ===== TAP TO PLACE (usando gli eventi di A-Frame) =====
  const promptEl = document.getElementById('promptText');
  const statusEl = document.getElementById('status');
  
  // Ascolta l'evento 'click' su tutta la scena (gestito da 8th Wall)
  document.querySelector('a-scene').addEventListener('click', (event) => {
    // L'evento contiene il punto di intersezione con il terreno rilevato da 8th Wall
    if (event.detail && event.detail.intersection) {
      const point = event.detail.intersection.point;
      
      // Nascondi prompt dopo primo tap
      if (promptEl) promptEl.style.display = 'none';
      
      // Crea cactus
      const cactus = document.createElement('a-entity');
      cactus.setAttribute('position', `${point.x} ${point.y} ${point.z}`);
      cactus.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
      cactus.setAttribute('scale', '0.001 0.001 0.001');
      cactus.setAttribute('visible', 'true');
      cactus.setAttribute('gltf-model', '#cactusModel');
      cactus.setAttribute('shadow', 'receive: false; cast: true');
      
      document.querySelector('a-scene').appendChild(cactus);
      
      cactus.addEventListener('model-loaded', () => {
        cactus.setAttribute('animation', {
          property: 'scale',
          to: '0.7 0.7 0.7',
          easing: 'easeOutElastic',
          dur: 600
        });
      });
      
      statusEl.innerText = '🌵 Cactus posizionato!';
      setTimeout(() => {
        if (statusEl.innerText === '🌵 Cactus posizionato!') {
          statusEl.innerText = '🟢 AR pronto! Tocca il terreno';
        }
      }, 2000);
    }
  });
</script>

</body>
</html>
