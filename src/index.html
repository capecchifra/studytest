<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR Cactus - Tocca per posizionare</title>
  
  <!-- 8-Frame (versione modificata di A-Frame per 8th Wall) -->
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  
  <!-- Engine binary 8th Wall con SLAM -->
  <script async src="./external/xr/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: #ffaa00;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
    }
    #instructions {
      position: fixed;
      bottom: 30px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 16px;
      z-index: 100;
      pointer-events: none;
    }
    .status-ready { background: rgba(0,100,0,0.8); color: #aaffaa; }
    .status-tap { background: rgba(0,0,0,0.8); color: white; }
  </style>
</head>

<body>

<div id="status">🔍 Inizializzazione AR...</div>
<div id="instructions">🌵 Tocca il terreno per posizionare un cactus</div>

<!-- 
  La configurazione CORRETTA per 8th Wall + A-Frame:
  - xrconfig: obbligatorio
  - xrweb: per world tracking
  - cursor raycast: per gestire i click
  - raycaster: per rilevare oggetti con classe "cantap"
-->
<a-scene
  xrconfig
  xrweb="allowedDevices: any"
  cursor="rayOrigin: mouse"
  raycaster="objects: .cantap; far: 100; interval: 100"
  renderer="colorManagement: true; antialias: true">

  <a-assets timeout="10000">
    <!-- Cactus fatto con primitive A-Frame (nessun file esterno) -->
    <a-mixin id="cactus">
      <a-entity>
        <!-- Corpo principale -->
        <a-cylinder radius="0.3" height="0.8" color="#2d6a2d" position="0 0.4 0"></a-cylinder>
        <!-- Braccio sinistro -->
        <a-cylinder radius="0.12" height="0.5" color="#2d6a2d" position="-0.35 0.65 0" rotation="0 0 35"></a-cylinder>
        <!-- Braccio destro -->
        <a-cylinder radius="0.12" height="0.5" color="#2d6a2d" position="0.35 0.65 0" rotation="0 0 -35"></a-cylinder>
        <!-- Testa -->
        <a-sphere radius="0.28" color="#2d6a2d" position="0 0.95 0"></a-sphere>
        <!-- Fiore -->
        <a-sphere radius="0.12" color="#ff69b4" position="0 1.15 0.15"></a-sphere>
        <a-sphere radius="0.08" color="#ffdd44" position="0 1.15 0.25"></a-sphere>
        <!-- Spine decorative -->
        <a-cone radius-bottom="0.04" radius-top="0" height="0.08" color="#c8e6c8" position="0.2 0.5 0.32"></a-cone>
        <a-cone radius-bottom="0.04" radius-top="0" height="0.08" color="#c8e6c8" position="-0.2 0.5 0.32"></a-cone>
      </a-entity>
    </a-mixin>
  </a-assets>

  <!-- Camera -->
  <a-camera id="camera" position="0 1.6 0"></a-camera>

  <!-- Piano invisibile per ricevere i tap (classe "cantap" per il raycaster) -->
  <a-plane 
    id="ground-plane"
    class="cantap"
    rotation="-90 0 0"
    position="0 0 0"
    width="1000"
    height="1000"
    material="shader: standard; transparent: true; opacity: 0; side: double">
  </a-plane>

  <!-- Luci -->
  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" intensity="0.9" position="2 3 2" shadow="enabled: true"></a-light>
  <a-light type="directional" intensity="0.4" position="-1 2 -2" color="#ffaa66"></a-light>

</a-scene>

<script>
  const statusDiv = document.getElementById('status');
  const instructionsDiv = document.getElementById('instructions');
  
  let isPlaneDetected = false;
  let placedCount = 0;
  
  // ===== INIZIALIZZAZIONE 8TH WALL =====
  window.onxrloaded = function() {
    console.log('XR8 loaded, initializing...');
    statusDiv.innerHTML = '✅ AR pronto! Tocca il terreno';
    statusDiv.className = 'status-ready';
    
    if (XR8 && XR8.XrController) {
      // Configura il rilevamento dei piani orizzontali
      XR8.XrController.configure({
        planeDetection: {
          enabled: true,
          classificationType: 'floor', // Solo piani orizzontali (pavimenti)
          visualFeedback: false
        }
      });
      console.log('Plane detection configured');
    }
  };
  
  if (window.XR8) {
    window.onxrloaded();
  }
  
  // ===== FUNZIONE PER POSIZIONARE IL CACTUS =====
  function placeCactus(position) {
    const scene = document.querySelector('a-scene');
    if (!scene) return;
    
    placedCount++;
    
    // Crea il cactus
    const cactus = document.createElement('a-entity');
    cactus.setAttribute('mixin', 'cactus');
    cactus.setAttribute('position', `${position.x} ${position.y} ${position.z}`);
    cactus.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
    cactus.setAttribute('scale', '0 0 0');
    cactus.setAttribute('shadow', 'receive: false; cast: true');
    
    scene.appendChild(cactus);
    
    // Animazione di crescita
    setTimeout(() => {
      cactus.setAttribute('animation', {
        property: 'scale',
        to: '0.6 0.6 0.6',
        easing: 'easeOutElastic',
        dur: 600
      });
    }, 10);
    
    // Feedback visivo
    statusDiv.innerHTML = `🌵 Cactus #${placedCount} posizionato!`;
    statusDiv.className = '';
    
    setTimeout(() => {
      if (statusDiv.innerHTML.includes('posizionato')) {
        statusDiv.innerHTML = '✅ AR pronto! Tocca il terreno';
        statusDiv.className = 'status-ready';
      }
    }, 2000);
    
    // Nascondi le istruzioni dopo il primo posizionamento
    if (placedCount === 1 && instructionsDiv) {
      instructionsDiv.style.opacity = '0.5';
    }
    
    console.log(`Cactus placed at: ${position.x}, ${position.y}, ${position.z}`);
  }
  
  // ===== GESTIONE TAP CON RAYCASTER =====
  // Aspetta che la scena sia pronta
  window.addEventListener('load', () => {
    const scene = document.querySelector('a-scene');
    const groundPlane = document.getElementById('ground-plane');
    
    if (!scene) {
      console.error('Scene not found!');
      return;
    }
    
    console.log('Scene loaded, setting up click handler');
    
    // Metodo 1: Evento click sul piano (più affidabile)
    if (groundPlane) {
      groundPlane.addEventListener('click', (evt) => {
        console.log('Ground plane clicked!', evt);
        
        // Ottieni il punto di intersezione dal raycaster
        if (evt.detail && evt.detail.intersection && evt.detail.intersection.point) {
          const point = evt.detail.intersection.point;
          placeCactus(point);
        }
      });
      
      console.log('Click handler attached to ground plane');
    }
    
    // Metodo 2: Evento click sulla scena (fallback)
    scene.addEventListener('click', (evt) => {
      console.log('Scene click event:', evt);
      
      // Prova a ottenere il punto dall'intersezione del raycaster
      if (evt.detail && evt.detail.intersection && evt.detail.intersection.point) {
        const point = evt.detail.intersection.point;
        placeCactus(point);
      }
    });
    
    // Metodo 3: Touch per mobile
    scene.addEventListener('touchstart', (e) => {
      if (e.touches && e.touches[0]) {
        console.log('Touch detected, dispatching click');
        e.preventDefault();
        
        // Crea un evento click nella posizione del touch
        const clickEvent = new MouseEvent('click', {
          clientX: e.touches[0].clientX,
          clientY: e.touches[0].clientY
        });
        
        // Prova a trovare l'elemento sotto il touch
        const elem = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        if (elem) {
          elem.dispatchEvent(clickEvent);
        }
        scene.dispatchEvent(clickEvent);
      }
    });
    
    // Opzionale: evento xr:realityready (quando 8th Wall è veramente pronto)
    scene.addEventListener('xr:realityready', () => {
      console.log('XR Reality Ready - tracking active');
      statusDiv.innerHTML = '🎯 AR attivo! Tocca il terreno';
    });
  });
  
  // Debug: verifica che il piano sia stato creato
  setTimeout(() => {
    const groundPlane = document.getElementById('ground-plane');
    if (groundPlane) {
      console.log('Ground plane exists, classes:', groundPlane.className);
    } else {
      console.error('Ground plane NOT found!');
    }
  }, 2000);
</script>

</body>
</html>
