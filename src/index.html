<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR Cactus - Tocca per posizionare</title>
  
  <!-- 8-Frame -->
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  
  <!-- Engine binary 8th Wall con SLAM -->
  <script async src="./external/xr/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #info {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px;
      border-radius: 8px;
      margin: 20px;
      pointer-events: none;
      z-index: 10;
      font-size: 16px;
    }
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: #ffaa00;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      z-index: 10;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="status">🟡 Avvio AR...</div>
<div id="info">🌵 Tocca il terreno per posizionare un cactus</div>

<!-- Scena A-Frame -->
<a-scene
  xrconfig
  xrweb="allowedDevices: any; enableInteraction: true"
  renderer="colorManagement: true; antialias: true">

  <!-- Asset: cactus fatto con primitive (nessun file esterno) -->
  <a-assets timeout="10000">
    <a-mixin id="cactus">
      <a-entity>
        <!-- Corpo -->
        <a-cylinder radius="0.3" height="0.8" color="#2d6a2d" position="0 0.4 0"></a-cylinder>
        <!-- Braccio sinistro -->
        <a-cylinder radius="0.12" height="0.5" color="#2d6a2d" position="-0.35 0.65 0" rotation="0 0 35"></a-cylinder>
        <!-- Braccio destro -->
        <a-cylinder radius="0.12" height="0.5" color="#2d6a2d" position="0.35 0.65 0" rotation="0 0 -35"></a-cylinder>
        <!-- Testa -->
        <a-sphere radius="0.28" color="#2d6a2d" position="0 0.95 0"></a-sphere>
        <!-- Fiore (opzionale) -->
        <a-sphere radius="0.12" color="#ff69b4" position="0 1.15 0.15"></a-sphere>
        <a-sphere radius="0.08" color="#ffdd44" position="0 1.15 0.25"></a-sphere>
      </a-entity>
    </a-mixin>
  </a-assets>

  <!-- Camera -->
  <a-camera id="camera"></a-camera>

  <!-- Luci -->
  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" intensity="0.9" position="2 3 2" shadow="enabled: true"></a-light>
  <a-light type="directional" intensity="0.4" position="-1 2 -2" color="#ffaa66"></a-light>

</a-scene>

<script>
  window.addEventListener('load', () => {
    const statusDiv = document.getElementById('status');
    const infoDiv = document.getElementById('info');
    
    // Inizializzazione 8th Wall
    window.onxrloaded = function() {
      statusDiv.innerHTML = '✅ AR pronto! Tocca il terreno';
      statusDiv.style.color = '#aaffaa';
      
      if (XR8 && XR8.XrController) {
        XR8.XrController.configure({
          planeDetection: { enabled: true, classificationType: 'floor' }
        });
      }
      
      setTimeout(() => {
        if (infoDiv) infoDiv.style.opacity = '0.7';
      }, 5000);
    };
    
    if (window.XR8) window.onxrloaded();
    
    // Posiziona cactus
    function placeCactus(position) {
      const scene = document.querySelector('a-scene');
      const cactus = document.createElement('a-entity');
      
      cactus.setAttribute('mixin', 'cactus');
      cactus.setAttribute('position', `${position.x} ${position.y} ${position.z}`);
      cactus.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
      cactus.setAttribute('scale', '0 0 0');
      cactus.setAttribute('shadow', 'receive: false; cast: true');
      
      scene.appendChild(cactus);
      
      setTimeout(() => {
        cactus.setAttribute('animation', {
          property: 'scale',
          to: '0.5 0.5 0.5',
          easing: 'easeOutElastic',
          dur: 600
        });
      }, 10);
      
      statusDiv.innerHTML = '🌵 Cactus posizionato!';
      setTimeout(() => {
        if (statusDiv.innerHTML === '🌵 Cactus posizionato!') 
          statusDiv.innerHTML = '✅ AR pronto!';
      }, 2000);
    }
    
    // Gestione tap
    const scene = document.querySelector('a-scene');
    
    scene.addEventListener('click', (evt) => {
      if (evt.detail && evt.detail.intersection && evt.detail.intersection.point) {
        placeCactus(evt.detail.intersection.point);
      } 
      else if (XR8 && XR8.XrController && XR8.XrController.reticleManager) {
        const x = evt.clientX / window.innerWidth;
        const y = evt.clientY / window.innerHeight;
        
        XR8.XrController.reticleManager.hitTest(x, y, (err, hit) => {
          if (!err && hit && hit.position) {
            placeCactus(hit.position);
          } else {
            statusDiv.innerHTML = '⚠️ Tocca un piano (terra/pavimento)';
            setTimeout(() => {
              if (statusDiv.innerHTML === '⚠️ Tocca un piano (terra/pavimento)')
                statusDiv.innerHTML = '✅ AR pronto!';
            }, 1500);
          }
        });
      }
    });
    
    // Touch mobile
    scene.addEventListener('touchstart', (e) => {
      if (e.touches && e.touches[0]) {
        e.preventDefault();
        const evt = new MouseEvent('click', {
          clientX: e.touches[0].clientX,
          clientY: e.touches[0].clientY
        });
        scene.dispatchEvent(evt);
      }
    });
  });
</script>

</body>
</html>
