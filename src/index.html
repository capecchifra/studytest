<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Cactus</title>
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="./external/xr/xr.js" async data-preload-chunks="slam"></script>
  <meta name="8thwall:renderer" content="aframe:1.5.0"/>
</head>
<body>

<div style="position:fixed; bottom:20px; left:0; right:0; text-align:center; background:black; color:white; padding:15px; z-index:100; font-size:20px">
  🔴 INIZIALIZZAZIONE...
</div>

<a-scene xrconfig xrweb="allowedDevices: any" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
  <a-camera position="0 8 8"></a-camera>
  <a-light type="ambient" intensity="0.7"></a-light>
  <a-light type="directional" position="1 2 1"></a-light>
  <a-box id="ground" class="clickable" scale="1000 2 1000" position="0 -0.99 0" material="opacity:0"></a-box>
</a-scene>

<script>
  const msg = document.querySelector('div');
  
  window.onxrloaded = function() {
    msg.innerHTML = '✅ AR PRONTO! Tocca il terreno';
    msg.style.background = 'green';
    if (XR8 && XR8.XrController) {
      XR8.XrController.configure({ planeDetection: { enabled: false } });
    }
  };
  
  if (window.XR8) {
    window.onxrloaded();
  } else {
    window.addEventListener('xrloaded', window.onxrloaded);
  }
  
  // Aspetta la scena
  setTimeout(() => {
    const ground = document.getElementById('ground');
    if (ground) {
      ground.addEventListener('click', (e) => {
        msg.innerHTML = '🌵 TAP RILEVATO! Posiziono cactus...';
        
        const cactus = document.createElement('a-cylinder');
        cactus.setAttribute('radius', '0.3');
        cactus.setAttribute('height', '0.8');
        cactus.setAttribute('color', '#2d6a2d');
        cactus.setAttribute('position', e.detail.intersection.point);
        cactus.setAttribute('scale', '0 0 0');
        
        document.querySelector('a-scene').appendChild(cactus);
        
        setTimeout(() => {
          cactus.setAttribute('animation', {
            property: 'scale',
            to: '1 1 1',
            dur: 500,
            easing: 'easeOutElastic'
          });
        }, 10);
        
        setTimeout(() => {
          msg.innerHTML = '✅ AR PRONTO! Tocca il terreno';
        }, 2000);
      });
      console.log('Ground trovato, listener aggiunto');
    } else {
      console.error('Ground NON trovato');
      msg.innerHTML = '❌ ERRORE: ground non trovato';
    }
  }, 2000);
</script>

</body>
</html>
