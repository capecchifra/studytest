<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>A-Frame: Tap to Place Ground</title>
  <meta name="description" content="Cresci cactus 🌵 toccando il terreno">

  <!-- 1. 8-Frame (A-Frame modificato) -->
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  
  <!-- 2. Engine binary self-hostato (SLAM incluso) -->
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script>

  <!-- 3. Configurazione 8th Wall -->
  <meta name="8thwall:renderer" content="aframe:1.5.0"/>

  <style>
    body { margin: 0; overflow: hidden; }
    .over {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    #promptText {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 18px;
      display: inline-block;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div class="over">
  <span id="promptText">🌵 Tocca il terreno per posizionare</span>
</div>

<!-- A-Scene con i componenti corretti -->
<a-scene
  tap-place
  xrconfig
  xrweb="allowedDevices: any"
  renderer="colorManagement:true">

  <a-assets>
    <img id="groundTex" src="assets/sand.jpg">
    <a-asset-item id="cactusModel" src="assets/cactus.glb"></a-asset-item>
  </a-assets>

  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <!-- Luce direzionale (semplificata, senza xrextras) -->
  <a-entity
    light="type: directional; intensity: 0.8; castShadow: true; target: #camera"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -0.99 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>

<script>
  // Componente tap-place
  AFRAME.registerComponent('tap-place', {
    init() {
      const ground = document.getElementById('ground')
      const promptEl = document.getElementById('promptText')
      
      ground.addEventListener('click', (event) => {
        if (promptEl) promptEl.style.display = 'none'
        
        const newElement = document.createElement('a-entity')
        const touchPoint = event.detail.intersection.point
        newElement.setAttribute('position', touchPoint)
        
        const randomYRotation = Math.random() * 360
        newElement.setAttribute('rotation', `0 ${randomYRotation} 0`)
        newElement.setAttribute('visible', 'false')
        newElement.setAttribute('scale', '0.0001 0.0001 0.0001')
        newElement.setAttribute('shadow', { receive: false })
        newElement.setAttribute('gltf-model', '#cactusModel')
        
        this.el.sceneEl.appendChild(newElement)
        
        newElement.addEventListener('model-loaded', () => {
          newElement.setAttribute('visible', 'true')
          newElement.setAttribute('animation', {
            property: 'scale',
            to: '7 7 7',
            easing: 'easeOutElastic',
            dur: 800,
          })
        })
      })
    }
  })
</script>

</body>
</html>
