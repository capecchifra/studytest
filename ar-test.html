<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR Cactus - Test Finale</title>
  
  <!-- 8th Wall Engine Binary - CDN UFFICIALE -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" 
          async 
          crossorigin="anonymous" 
          data-preload-chunks="slam"></script>
  
  <meta name="8thwall:renderer" content="aframe:1.5.0"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: system-ui, sans-serif; }
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: #ffaa00;
      padding: 12px 20px;
      border-radius: 30px;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      z-index: 200;
      pointer-events: none;
      backdrop-filter: blur(5px);
    }
    #status.ready {
      background: rgba(0,100,0,0.8);
      color: #aaffaa;
    }
    #instruction {
      position: fixed;
      bottom: 40px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px 20px;
      border-radius: 40px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      z-index: 200;
      pointer-events: none;
      backdrop-filter: blur(5px);
    }
    @media (max-width: 600px) {
      #instruction { font-size: 14px; bottom: 30px; }
      #status { font-size: 11px; top: 10px; }
    }
  </style>
</head>
<body>

<div id="status">🔍 Inizializzazione AR...</div>
<div id="instruction">🌵 MUOVI IL TELEFONO<br>POI TOCCHIA IL TERRENO</div>

<!-- A-Frame scena semplificata -->
<a-scene
  xrconfig
  xrweb="allowedDevices: any"
  cursor="rayOrigin: mouse"
  raycaster="objects: .ground"
  renderer="colorManagement: true; antialias: true"
  embedded
  style="position: fixed; top: 0; left: 0; width: 100%; height: 100%;">

  <a-camera id="camera" position="0 8 8"></a-camera>

  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" intensity="0.8" position="2 3 2"></a-light>

  <!-- Terreno invisibile ma cliccabile -->
  <a-plane 
    id="ground"
    class="ground"
    rotation="-90 0 0"
    position="0 0 0"
    width="1000"
    height="1000"
    material="shader: standard; transparent: true; opacity: 0; side: double">
  </a-plane>

</a-scene>

<script>
  const statusDiv = document.getElementById('status');
  const instructionDiv = document.getElementById('instruction');
  let cactusCount = 0;
  
  // ===== INIZIALIZZAZIONE 8TH WALL =====
  window.onxrloaded = function() {
    console.log('XR8 loaded!');
    statusDiv.innerHTML = '✅ AR ATTIVO!';
    statusDiv.classList.add('ready');
    
    if (XR8 && XR8.XrController) {
      XR8.XrController.configure({ 
        planeDetection: { enabled: false }
      });
    }
    
    setTimeout(() => {
      instructionDiv.innerHTML = '🌵 TOCCHIA IL TERRENO per posizionare un cactus';
    }, 2000);
  };
  
  if (window.XR8) {
    window.onxrloaded();
  } else {
    window.addEventListener('xrloaded', window.onxrloaded);
  }
  
  // ===== CREA CACTUS CON PRIMITIVE =====
  function createCactus(x, y, z) {
    cactusCount++;
    
    const scene = document.querySelector('a-scene');
    const cactus = document.createElement('a-entity');
    cactus.setAttribute('position', `${x} ${y} ${z}`);
    cactus.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
    cactus.setAttribute('scale', '0 0 0');
    
    // Corpo
    const body = document.createElement('a-cylinder');
    body.setAttribute('radius', '0.25');
    body.setAttribute('height', '0.7');
    body.setAttribute('color', '#2d6a2d');
    body.setAttribute('position', '0 0.35 0');
    cactus.appendChild(body);
    
    // Braccio sinistro
    const armL = document.createElement('a-cylinder');
    armL.setAttribute('radius', '0.1');
    armL.setAttribute('height', '0.45');
    armL.setAttribute('color', '#2d6a2d');
    armL.setAttribute('position', '-0.3 0.6 0');
    armL.setAttribute('rotation', '0 0 30');
    cactus.appendChild(armL);
    
    // Braccio destro
    const armR = document.createElement('a-cylinder');
    armR.setAttribute('radius', '0.1');
    armR.setAttribute('height', '0.45');
    armR.setAttribute('color', '#2d6a2d');
    armR.setAttribute('position', '0.3 0.6 0');
    armR.setAttribute('rotation', '0 0 -30');
    cactus.appendChild(armR);
    
    // Testa
    const head = document.createElement('a-sphere');
    head.setAttribute('radius', '0.22');
    head.setAttribute('color', '#2d6a2d');
    head.setAttribute('position', '0 0.85 0');
    cactus.appendChild(head);
    
    // Fiore
    const flower = document.createElement('a-sphere');
    flower.setAttribute('radius', '0.1');
    flower.setAttribute('color', '#ff69b4');
    flower.setAttribute('position', '0 1.05 0.1');
    cactus.appendChild(flower);
    
    scene.appendChild(cactus);
    
    // Animazione crescita
    setTimeout(() => {
      cactus.setAttribute('animation', {
        property: 'scale',
        to: '0.5 0.5 0.5',
        easing: 'easeOutElastic',
        dur: 500
      });
    }, 10);
    
    statusDiv.innerHTML = `🌵 CACTUS #${cactusCount} POSIZIONATO!`;
    statusDiv.classList.add('ready');
    
    setTimeout(() => {
      statusDiv.innerHTML = '✅ AR ATTIVO!';
    }, 2000);
    
    if (cactusCount === 1) {
      instructionDiv.innerHTML = '🌵 CONTINUA! TOCCHIA ANCORA';
      setTimeout(() => {
        instructionDiv.innerHTML = '🌵 TOCCHIA IL TERRENO per altri cactus';
      }, 3000);
    }
  }
  
  // ===== GESTIONE TAP =====
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const ground = document.getElementById('ground');
      
      if (ground) {
        ground.addEventListener('click', (event) => {
          console.log('Tap rilevato!', event.detail);
          
          if (event.detail && event.detail.intersection && event.detail.intersection.point) {
            const point = event.detail.intersection.point;
            console.log('Posizione:', point);
            createCactus(point.x, point.y, point.z);
          } else {
            console.log('Nessuna intersezione');
            statusDiv.innerHTML = '⚠️ Tocca il terreno visibile';
            setTimeout(() => {
              if (statusDiv.innerHTML === '⚠️ Tocca il terreno visibile') {
                statusDiv.innerHTML = '✅ AR ATTIVO!';
              }
            }, 1500);
          }
        });
        
        console.log('Ground pronto, listener aggiunto');
      } else {
        console.error('Ground non trovato!');
      }
    }, 1000);
  });
  
  // Supporto touch
  document.body.addEventListener('touchstart', (e) => {
    if (e.target.closest('a-scene')) {
      console.log('Touch su scena');
    }
  });
  
  console.log('Script caricato - attendi AR...');
</script>

</body>
</html>
