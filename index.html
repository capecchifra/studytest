<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>8th Wall AR - Tap to Place</title>
  
  <!-- 8th Wall Engine Binary dal CDN UFFICIALE (opzione 1 della documentazione) -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" 
          async 
          crossorigin="anonymous" 
          data-preload-chunks="slam"></script>
  
  <!-- A-Frame (8-Frame) -->
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>

  <meta name="8thwall:renderer" content="aframe:1.5.0"/>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #prompt {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px;
      font-size: 18px;
      z-index: 100;
      pointer-events: none;
    }
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      color: #ffaa00;
      padding: 8px 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="status">🟡 Inizializzazione AR...</div>
<div id="prompt">🌵 Tocca il terreno per posizionare un cactus</div>

<a-scene
  xrconfig
  xrweb="allowedDevices: any"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable"
  renderer="colorManagement:true">

  <a-assets>
    <!-- Cactus fatto con primitive (nessun file esterno) -->
    <a-mixin id="cactus">
      <a-cylinder radius="0.3" height="0.8" color="#2d6a2d" position="0 0.4 0"></a-cylinder>
      <a-cylinder radius="0.12" height="0.5" color="#2d6a2d" position="-0.35 0.65 0" rotation="0 0 35"></a-cylinder>
      <a-cylinder radius="0.12" height="0.5" color="#2d6a2d" position="0.35 0.65 0" rotation="0 0 -35"></a-cylinder>
      <a-sphere radius="0.28" color="#2d6a2d" position="0 0.95 0"></a-sphere>
      <a-sphere radius="0.1" color="#ff69b4" position="0 1.15 0.12"></a-sphere>
    </a-mixin>
  </a-assets>

  <a-camera id="camera" position="0 8 8"></a-camera>

  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" intensity="0.8" position="2 3 2"></a-light>

  <!-- Terreno cliccabile -->
  <a-box id="ground" class="clickable" scale="1000 2 1000" position="0 -0.99 0" material="opacity: 0.3; color: gray"></a-box>

</a-scene>

<script>
  const statusDiv = document.getElementById('status');
  const promptDiv = document.getElementById('prompt');
  
  let cactusCount = 0;
  
  // Inizializzazione secondo la documentazione ufficiale
  window.onxrloaded = function() {
    statusDiv.innerHTML = '✅ AR pronto! Tocca il terreno';
    statusDiv.style.color = '#aaffaa';
    
    // Configurazione opzionale
    if (XR8 && XR8.XrController) {
      // Disabilita plane detection per usare il box fittizio
      XR8.XrController.configure({ 
        planeDetection: { enabled: false }
      });
    }
  };
  
  // Se XR8 è già caricato
  if (window.XR8) {
    window.onxrloaded();
  } else {
    window.addEventListener('xrloaded', window.onxrloaded);
  }
  
  // Componente tap-place
  AFRAME.registerComponent('tap-place', {
    init() {
      const ground = document.getElementById('ground');
      
      ground.addEventListener('click', (event) => {
        cactusCount++;
        
        // Nascondi prompt dopo il primo tap
        promptDiv.style.opacity = '0.5';
        
        // Crea cactus
        const cactus = document.createElement('a-entity');
        cactus.setAttribute('mixin', 'cactus');
        cactus.setAttribute('position', event.detail.intersection.point);
        cactus.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
        cactus.setAttribute('scale', '0 0 0');
        cactus.setAttribute('shadow', 'cast: true');
        
        this.el.sceneEl.appendChild(cactus);
        
        // Animazione
        setTimeout(() => {
          cactus.setAttribute('animation', {
            property: 'scale',
            to: '0.6 0.6 0.6',
            easing: 'easeOutElastic',
            dur: 600
          });
        }, 10);
        
        // Feedback
        statusDiv.innerHTML = `🌵 Cactus #${cactusCount} posizionato!`;
        setTimeout(() => {
          statusDiv.innerHTML = '✅ AR pronto!';
        }, 2000);
      });
    }
  });
  
  // Aggiungi il componente alla scena
  const scene = document.querySelector('a-scene');
  if (scene && !scene.hasAttribute('tap-place')) {
    scene.setAttribute('tap-place', '');
  }
</script>

</body>
</html>
