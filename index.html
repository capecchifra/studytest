<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <title>A-Frame: Tap to Place Ground - Con Cursore Visibile</title>
  <meta itemprop="name" content="A-Frame: Tap to Place Ground">
  <meta name="twitter:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:site_name" content="A-Frame: Tap to Place Ground">
  <meta name="description" content="Posiziona cactus 🌵 toccando il terreno - con cursore visibile">
  
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="./external/xrextras/xrextras.js"></script>
  <script src="./external/landing-page/landing-page.js"></script>
  <script src="./external/xr/xr.js" async data-preload-chunks="slam"></script>

  <meta name="8thwall:renderer" content="aframe:1.5.0"/>
  <meta name="8thwall:package" content="@8thwall.xrextras"/>
  <meta name="8thwall:package" content="@8thwall.landing-page"/>

  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    
    .over {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    #promptText {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 18px;
      display: inline-block;
    }
    
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      color: #ffaa00;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 20;
      pointer-events: none;
      font-family: monospace;
    }
  </style>
</head>

<body>

<div id="status">🔍 Inizializzazione AR...</div>
<div class="over">
  <span id="promptText">🎯 Segui il cerchio ROSSO a terra, poi tocca</span>
</div>

<a-scene
  cursor-place
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
  xrweb="allowedDevices: any">

  <a-assets>
    <img id="groundTex" src="assets/sand.jpg">
    <a-asset-item id="cactusModel" src="assets/cactus.glb"></a-asset-item>
    
    <!-- CURSORE VISIBILE - cerchio rosso luminoso -->
    <a-mixin id="cursorMat">
      <!-- Disco esterno semitrasparente -->
      <a-circle radius="0.45" color="#ff3300" material="transparent: true; opacity: 0.4"></a-circle>
      <!-- Anello esterno spesso -->
      <a-ring radius="0.40" radius-tubular="0.06" color="#ff0000" material="transparent: true; opacity: 0.9"></a-ring>
      <!-- Anello interno sottile -->
      <a-ring radius="0.20" radius-tubular="0.04" color="#ffffff" material="transparent: true; opacity: 0.8"></a-ring>
      <!-- Punto centrale -->
      <a-sphere radius="0.05" color="#ff0000" position="0 0.02 0"></a-sphere>
    </a-mixin>
  </a-assets>

  <!-- Entità cursore che segue il terreno -->
  <a-entity id="cursor" mixin="cursorMat" position="0 0 0"></a-entity>

  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse">
  </a-camera>

  <a-entity
    light="type: directional; intensity: 0.8; castShadow: true; target: #camera"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -0.99 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>

<script>
  // Inizializzazione 8th Wall
  window.onxrloaded = function() {
    console.log('8th Wall ready');
    if (XR8 && XR8.XrController) {
      XR8.XrController.configure({ planeDetection: { enabled: false } });
    }
    document.getElementById('status').innerHTML = '✅ AR pronto! Sposta il telefono';
    document.getElementById('status').style.color = '#aaffaa';
  };
  
  if (window.XR8) {
    window.onxrloaded();
  } else {
    window.addEventListener('xrloaded', window.onxrloaded);
  }
</script>

<script>
  // Componente cursore-place (cursore visibile a terra)
  AFRAME.registerComponent('cursor-place', {
    init() {
      this.raycaster = new THREE.Raycaster()
      this.camera = document.getElementById('camera')
      this.threeCamera = this.camera.getObject3D('camera')
      this.ground = document.getElementById('ground')
      this.rayOrigin = new THREE.Vector2(0, 0)
      this.cursorLocation = new THREE.Vector3(0, 0, 0)
      this.cursor = document.getElementById('cursor')
      this.currentCactus = null
      this.prompt = document.getElementById('promptText')
      
      // Al click, posiziona il cactus
      this.el.sceneEl.addEventListener('click', () => {
        if (!this.cursorLocation) return
        
        // Rimuovi cactus precedente
        if (this.currentCactus) {
          this.currentCactus.parentNode?.removeChild(this.currentCactus)
        }
        
        // Crea nuovo cactus
        const cactus = document.createElement('a-entity')
        cactus.setAttribute('gltf-model', '#cactusModel')
        cactus.setAttribute('position', this.cursorLocation)
        cactus.setAttribute('scale', '0 0 0')
        cactus.setAttribute('shadow', { receive: false })
        
        const randomY = Math.random() * 360
        cactus.setAttribute('rotation', `0 ${randomY} 0`)
        
        this.el.sceneEl.appendChild(cactus)
        this.currentCactus = cactus
        
        // Animazione di crescita
        setTimeout(() => {
          cactus.setAttribute('animation', {
            property: 'scale',
            to: '6 6 6',
            easing: 'easeOutElastic',
            dur: 800
          })
        }, 10)
        
        // Feedback visivo
        if (this.prompt) {
          this.prompt.innerHTML = '🌵 Cactus posizionato!'
          setTimeout(() => {
            this.prompt.innerHTML = '🎯 Segui il cerchio ROSSO a terra, poi tocca'
          }, 2000)
        }
      })
    },
    
    tick() {
      if (!this.ground?.object3D) return
      
      // Raycast dal centro dello schermo al terreno
      this.raycaster.setFromCamera(this.rayOrigin, this.threeCamera)
      const intersects = this.raycaster.intersectObject(this.ground.object3D, true)
      
      if (intersects.length > 0) {
        this.cursorLocation = intersects[0].point
      }
      
      // Muovi il cursore verso il punto di intersezione
      if (this.cursor) {
        this.cursor.object3D.position.lerp(this.cursorLocation, 0.3)
        // Solleva leggermente per evitare che affondi nel terreno
        this.cursor.object3D.position.y += 0.08
        // Ruota verso la camera
        this.cursor.object3D.rotation.y = this.threeCamera.rotation.y
      }
    }
  })
</script>

</body>
</html>
