<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <title>AR Cactus - Cursore Piatto e Fluido</title>
  
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="./external/xrextras/xrextras.js"></script>
  <script src="./external/landing-page/landing-page.js"></script>
  <script src="./external/xr/xr.js" async data-preload-chunks="slam"></script>

  <meta name="8thwall:renderer" content="aframe:1.5.0"/>
  <meta name="8thwall:package" content="@8thwall.xrextras"/>
  <meta name="8thwall:package" content="@8thwall.landing-page"/>

  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    
    .over {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    #promptText {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 18px;
      display: inline-block;
    }
    
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      color: #ffaa00;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 20;
      pointer-events: none;
      font-family: monospace;
    }
  </style>
</head>

<body>

<div id="status">🔍 Inizializzazione AR...</div>
<div class="over">
  <span id="promptText">🎯 Segui il cerchio a terra, poi tocca</span>
</div>

<a-scene
  cursor-place
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
  xrweb="allowedDevices: any">

  <a-assets>
    <img id="groundTex" src="assets/sand.jpg">
    <a-asset-item id="cactusModel" src="assets/cactus.glb"></a-asset-item>
  </a-assets>

  <!-- CURSORE: cerchio PIATTO a terra (rotation -90 per renderlo orizzontale) -->
  <a-entity id="cursor" position="0 0 0" rotation="-90 0 0">
    <a-ring radius="0.4" radius-tubular="0.05" color="#ff4400" material="transparent: true; opacity: 0.9"></a-ring>
    <a-circle radius="0.35" color="#ff6600" material="transparent: true; opacity: 0.4"></a-circle>
    <a-ring radius="0.2" radius-tubular="0.03" color="#ffffff" material="transparent: true; opacity: 0.8"></a-ring>
    <!-- Puntino centrale -->
    <a-sphere radius="0.05" color="#ffffff" position="0 0.02 0"></a-sphere>
  </a-entity>

  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse">
  </a-camera>

  <a-entity
    light="type: directional; intensity: 0.8; castShadow: true; target: #camera"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -0.99 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>

<script>
  // Inizializzazione 8th Wall
  window.onxrloaded = function() {
    console.log('8th Wall ready');
    if (XR8 && XR8.XrController) {
      // Abilita plane detection per il reticleManager
      XR8.XrController.configure({ planeDetection: { enabled: true } });
    }
    document.getElementById('status').innerHTML = '✅ AR pronto! Muovi il telefono';
    document.getElementById('status').style.color = '#aaffaa';
  };
  
  if (window.XR8) {
    window.onxrloaded();
  } else {
    window.addEventListener('xrloaded', window.onxrloaded);
  }
</script>

<script>
  // Componente cursor-place con reticleManager NATIVO di 8th Wall (super fluido)
  AFRAME.registerComponent('cursor-place', {
    init() {
      this.cursor = document.getElementById('cursor')
      this.currentCactus = null
      this.prompt = document.getElementById('promptText')
      this.hasPlaced = false
      
      // Al click, posiziona il cactus
      this.el.sceneEl.addEventListener('click', () => {
        // Usa il reticleManager di 8th Wall per ottenere la posizione
        if (!XR8?.XrController?.reticleManager) return
        
        const position = XR8.XrController.reticleManager.getReticlePosition?.()
        const isOnPlane = XR8.XrController.reticleManager.getIsOnPlane?.()
        
        if (!position || !isOnPlane) {
          this.prompt.innerHTML = '⚠️ Inquadra un pavimento prima di toccare'
          setTimeout(() => {
            if (this.prompt.innerHTML.includes('Inquadra')) {
              this.prompt.innerHTML = '🎯 Segui il cerchio a terra, poi tocca'
            }
          }, 1500)
          return
        }
        
        // Rimuovi cactus precedente
        if (this.currentCactus) {
          this.currentCactus.parentNode?.removeChild(this.currentCactus)
        }
        
        // Crea nuovo cactus
        const cactus = document.createElement('a-entity')
        cactus.setAttribute('gltf-model', '#cactusModel')
        cactus.setAttribute('position', position)
        cactus.setAttribute('scale', '0 0 0')
        cactus.setAttribute('shadow', { receive: false })
        
        const randomY = Math.random() * 360
        cactus.setAttribute('rotation', `0 ${randomY} 0`)
        
        this.el.sceneEl.appendChild(cactus)
        this.currentCactus = cactus
        
        // Animazione di crescita
        setTimeout(() => {
          cactus.setAttribute('animation', {
            property: 'scale',
            to: '6 6 6',
            easing: 'easeOutElastic',
            dur: 800
          })
        }, 10)
        
        // Feedback visivo
        this.prompt.innerHTML = '🌵 Cactus posizionato!'
        setTimeout(() => {
          this.prompt.innerHTML = '🎯 Segui il cerchio a terra, poi tocca'
        }, 2000)
      })
    },
    
    tick() {
      // Aggiorna la posizione del cursore usando il reticleManager nativo
      if (!this.cursor) return
      if (!XR8?.XrController?.reticleManager) return
      
      const position = XR8.XrController.reticleManager.getReticlePosition?.()
      const isOnPlane = XR8.XrController.reticleManager.getIsOnPlane?.()
      
      if (position && isOnPlane) {
        // Posiziona il cursore PIATTO a terra
        this.cursor.object3D.position.copy(position)
        this.cursor.object3D.position.y += 0.05  // Leggermente sopra il terreno
        this.cursor.setAttribute('visible', 'true')
      } else {
        this.cursor.setAttribute('visible', 'false')
      }
    }
  })
</script>

</body>
</html>
