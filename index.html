<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>A-Frame: Tap to Place Ground</title>
  
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="./external/xrextras/xrextras.js"></script>
  <script src="./external/landing-page/landing-page.js"></script>
  <script src="./external/xr/xr.js" async data-preload-chunks="slam"></script>

  <meta name="8thwall:renderer" content="aframe:1.5.0"/>
  <meta name="8thwall:package" content="@8thwall.xrextras"/>
  <meta name="8thwall:package" content="@8thwall.landing-page"/>

  <style>
    .over { position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 10; pointer-events: none; }
    #promptText { background: rgba(0,0,0,0.7); color: white; padding: 12px 28px; border-radius: 40px; font-size: 18px; display: inline-block; font-family: sans-serif; }
  </style>
</head>

<body>

<div class="over">
  <span id="promptText">🌵 Tocca il terreno per posizionare</span>
</div>

<a-scene
  xrconfig
  tap-place
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
  xrweb="allowedDevices: any">

  <a-assets>
    <img id="groundTex" src="assets/sand.jpg">
    <a-asset-item id="cactusModel" src="assets/cactus.glb"></a-asset-item>
  </a-assets>

  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse">
  </a-camera>

  <a-entity
    light="type: directional; intensity: 0.8; castShadow: true; target: #camera"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -0.99 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>

<script>
  // Inizializzazione 8th Wall binary
  window.onxrloaded = function() {
    console.log('8th Wall binary ready');
    if (XR8 && XR8.XrController) {
      XR8.XrController.configure({ planeDetection: { enabled: false } });
    }
  };
  
  if (window.XR8) {
    window.onxrloaded();
  } else {
    window.addEventListener('xrloaded', window.onxrloaded);
  }
</script>

<script>
  // Componente tap-place (convertito da ES module)
  AFRAME.registerComponent('tap-place', {
    schema: {
      min: {default: 6},
      max: {default: 10},
    },
    init() {
      const ground = document.getElementById('ground')
      const prompt = document.getElementById('promptText')
      
      if (!ground) {
        console.error('Ground non trovato!')
        return
      }
      
      ground.addEventListener('click', (event) => {
        // Dismiss the prompt text.
        if (prompt) prompt.style.display = 'none'
        
        // Create new entity for the new object
        const newElement = document.createElement('a-entity')

        // The raycaster gives a location of the touch in the scene
        const touchPoint = event.detail.intersection.point
        newElement.setAttribute('position', touchPoint)

        const randomYRotation = Math.random() * 360
        newElement.setAttribute('rotation', `0 ${randomYRotation} 0`)

        const randomScale = Math.floor(Math.random() * (Math.floor(this.data.max) - Math.ceil(this.data.min)) + Math.ceil(this.data.min))

        newElement.setAttribute('visible', 'false')
        newElement.setAttribute('scale', '0.0001 0.0001 0.0001')

        newElement.setAttribute('shadow', {
          receive: false,
        })

        newElement.setAttribute('gltf-model', '#cactusModel')
        this.el.sceneEl.appendChild(newElement)

        newElement.addEventListener('model-loaded', () => {
          // Once the model is loaded, we are ready to show it popping in using an animation
          newElement.setAttribute('visible', 'true')
          newElement.setAttribute('animation', {
            property: 'scale',
            to: `${randomScale} ${randomScale} ${randomScale}`,
            easing: 'easeOutElastic',
            dur: 800,
          })
        })
      })
    },
  })
</script>

</body>
</html>
