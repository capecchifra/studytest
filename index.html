<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>A-Frame: Tap to Place Ground</title>
  <meta itemprop="name" content="A-Frame: Tap to Place Ground">
  <meta name="twitter:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:site_name" content="A-Frame: Tap to Place Ground">
  <meta name="description" content="This example allows the user to grow cacti 🌵 by tapping or clicking the ground.">
  
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="./external/xrextras/xrextras.js"></script>
  <script src="./external/landing-page/landing-page.js"></script>
  <script src="./external/xr/xr.js" async data-preload-chunks="slam"></script>

  <meta name="8thwall:renderer" content="aframe:1.5.0"/>
  <meta name="8thwall:package" content="@8thwall.xrextras"/>
  <meta name="8thwall:package" content="@8thwall.landing-page"/>

  <style>
    .over {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    #promptText {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 18px;
      display: inline-block;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div class="over">
  <span id="promptText">🌵 Tocca il terreno per posizionare</span>
</div>

<!-- 
  MODIFICA 1: aggiunto xrconfig (obbligatorio!)
-->
<a-scene
  xrconfig
  tap-place
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
  xrweb="
    allowedDevices: any;
    defaultEnvironmentFogIntensity: 0.5; 
    defaultEnvironmentFloorTexture: #groundTex; 
    defaultEnvironmentFloorColor: #FFF;
    defaultEnvironmentSkyBottomColor: #B4C4CC; 
    defaultEnvironmentSkyTopColor: #5ac8fa;
    defaultEnvironmentSkyGradientStrength: 0.5;">

  <a-assets>
    <img id="groundTex" src="assets/sand.jpg">
    <a-asset-item id="cactusModel" src="assets/cactus.glb"></a-asset-item>
  </a-assets>

  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-entity
    light="type: directional; intensity: 0.8; castShadow: true; target: #camera"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -0.99 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>

<script>
  // MODIFICA 2: inizializzazione obbligatoria per il binary
  window.onxrloaded = function() {
    console.log('8th Wall binary ready');
    if (XR8 && XR8.XrController) {
      // Disabilita plane detection per usare il box fittizio
      XR8.XrController.configure({ planeDetection: { enabled: false } });
    }
  };
  
  if (window.XR8) {
    window.onxrloaded();
  } else {
    window.addEventListener('xrloaded', window.onxrloaded);
  }
</script>

</body>
</html>
